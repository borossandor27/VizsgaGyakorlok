<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat - Szász Étterem</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="etterem.css">
</head>

<body>
    <div class="container">

        <header class="d-flex justify-content-between p-3">
            <h1>
                <img src="images/etterem_logo_white.png" class="logo">
                Szász Étterem
            </h1>
            <nav>
                <a href="index.html">Főoldal</a>
                <a href="menu.html">Menü</a>
                <a href="kapcsolat.html">Kapcsolat</a>
            </nav>
        </header>

        <main>
            <h3>Kapcsolat</h3>

            <div class="card p-3">
                <h5>Cím</h5>
                <p>1234 Budapest, Fő utca 1.</p>

                <h5>Telefonszám</h5>
                <p>+36 30 123 4567</p>

                <h5>Email</h5>
                <p>info@szaszetterem.hu</p>

                <h5>Nyitvatartás</h5>
                <p>Hétfő - Vasárnap: 10:00 - 22:00</p>

            <h3>Üzenet küldése</h3>

            <form class="card p-3">
                <div class="mb-3">
                    <label class="form-label">Név</label>
                    <input type="text" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Üzenet</label>
                    <textarea class="form-control" rows="4"></textarea>
                </div>

                <button class="btn btn-success">Küldés</button>
            </form>

        </main>

    <footer class="bg-light text-center p-3">
