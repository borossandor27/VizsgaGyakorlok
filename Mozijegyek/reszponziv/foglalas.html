    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🎬 CinemaApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#foMenu">

            <div class="collapse navbar-collapse" id="foMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Kezdőlap</a></li>
                    <li class="nav-item"><a class="nav-link" href="musorlista.html">Műsorlista</a></li>

                </ul>

        </div>
    </nav>

    <!-- Tartalom -->
    <div class="container">
        <h1 class="oldal-cim">Foglalás kezelése</h1>
        <p class="oldal-alcim">1. feladat: reszponzív felület + DEMO mentés (adatbázis nélkül)</p>

        <div class="urlap-keret mx-auto">

            <!-- Foglalás kiválasztása -->
            <div class="mb-3">
                <label for="foglalas" class="form-label">Foglalás kiválasztása</label>
                <select class="form-select" id="foglalas">
                    <option value="">Válasszon foglalást…</option>
                    <option value="1">FOG-001 – Kovács Anna – Dűne 2 (2025-06-10 18:00)</option>
                    <option value="2">FOG-002 – Nagy Péter – Fekete Párduc 3 (2025-06-10 20:30)</option>
                    <option value="3">FOG-003 – Tóth Eszter – Kung Fu Panda 5 (2025-06-11 15:00)</option>
                    <option value="4">FOG-004 – Szabó Bence – Oppenheimer (2025-06-11 17:30)</option>
                    <option value="5">FOG-005 – Varga Réka – A kis hableány (2025-06-12 14:00)</option>
                </select>
            </div>

            <!-- Módosítandó adat -->
            <div class="mb-3">
                <label for="uj_ulohelyek" class="form-label">Új ülőhelyek</label>
                <input type="text" class="form-control" id="uj_ulohelyek" placeholder="Pl. B3, B4">
            </div>

            <!-- Jegytípus módosítása -->
            <div class="mb-3">
                <label for="uj_jegytipus" class="form-label">Jegytípus módosítása</label>
                <select class="form-select" id="uj_jegytipus">
                    <option value="">Válasszon típust…</option>
                    <option>Teljes árú</option>
                    <option>Diákjegy</option>
                    <option>Nyugdíjas</option>
                    <option>Gyermekjegy (14 év alatt)</option>
                </select>
            </div>

            <!-- Gombok -->
            <div class="d-grid gap-2 mb-3">
                <button type="button" class="btn btn-primary">Módosítás mentése</button>
                <button type="button" class="btn btn-outline-danger">Foglalás lemondása</button>
            </div>

        </div>

        <div class="megjegyzes-doboz">
            <strong>Megjegyzés:</strong> Ebben a külön feladatban a módosítás és a lemondás DEMO (nem kerül
            adatbázisba).
        </div>
    </div>

</body>
