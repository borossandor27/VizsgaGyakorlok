<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Képek kezelése</title>
  <link rel="stylesheet" href="../bootstrap/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark furdo-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Öregfürdők</a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Kezdőlap</a></li>
          <li class="nav-item"><a class="nav-link" href="furdok.html">Fürdők listája</a></li>
          <li class="nav-item"><a class="nav-link" href="hozzaadas.html">Új fürdő</a></li>
          <li class="nav-item"><a class="nav-link active" href="kepek.html">Képek</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-4" style="max-width:640px">
    <h2 class="mb-1">Képlink módosítása</h2>
    <p class="text-muted mb-4">
      Válasszon ki egy fürdőt, adjon meg URL-t, majd mentse
      <code>(PUT /api/furdok/{azon}/kep)</code>.
      Az <strong>Automatikus beállítás</strong> gomb a feladat
      szerinti 1..10 szabályt állítja be.
    </p>

    <div id="uzenet" class="d-none mb-3"></div>

    <div class="mb-3">
      <label class="form-label">Fa kiválasztása</label>
      <select class="form-select" id="furdo_id" onchange="furdo_kivalasztva()">
        <option value="">Válasszon...</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label">Új képlink</label>
      <input class="form-control" id="url" type="url"
        placeholder="kepek/3.jpg vagy https://" />
    </div>

    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-primary" onclick="mentes()">Mentés</button>
      <button class="btn btn-outline-secondary" onclick="autoBeallitas()">
        Automatikus beállítás (1..10)
      </button>
      <a href="furdok.html" class="btn btn-outline-secondary">Lista megnyitása</a>
    </div>
  </div>

  <script src="../bootstrap/bootstrap.bundle.min.js"></script>
  <script>
    const API = 'http://localhost:5000';
    let osszesFurdo = [];

    fetch(`${API}/api/furdok`)
      .then(r => r.json())
      .then(data => {
        osszesFurdo = data;
        const sel = document.getElementById('furdo_id');
        data.forEach(f => {
          sel.innerHTML += `<option value="${f.azon}">${f.azon} – ${f.nev}</option>`;
        });
      });

    function furdo_kivalasztva() {
      const azon = parseInt(document.getElementById('furdo_id').value);
      const f = osszesFurdo.find(x => x.azon === azon);
      document.getElementById('url').value = f?.URL || '';
    }

    function mentes() {
      const azon = document.getElementById('furdo_id').value;
      const url  = document.getElementById('url').value;
      if (!azon) { alert('Kérem válasszon fürdőt!'); return; }

      fetch(`${API}/api/furdok/${azon}/kep`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ URL: url })
      })
        .then(r => {
          jelzesKiir(r.ok ? 'success' : 'danger',
            r.ok ? 'Képlink sikeresen mentve!' : 'Hiba a mentés során.');
        })
        .catch(err => jelzesKiir('danger', 'Kapcsolódási hiba: ' + err.message));
    }

    function autoBeallitas() {
      const kuldendok = osszesFurdo.filter(f => f.azon <= 10);
      let i = 0;
      function kuldes() {
        if (i >= kuldendok.length) {
          jelzesKiir('success', `Automatikus beállítás kész: ${i} rekord frissítve.`);
          return;
        }
        const f = kuldendok[i++];
        fetch(`${API}/api/furdok/${f.azon}/kep`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ URL: `kepek/${f.azon}.jpg` })
        }).finally(kuldes);
      }
      kuldes();
    }

    function jelzesKiir(tipus, szoveg) {
      const div = document.getElementById('uzenet');
      div.className = `alert alert-${tipus}`;
      div.textContent = szoveg;
    }
  </script>
</body>
</html>
