<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Új lejátszási lista</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Zenetár</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="index.html">Kezdőlap</a>
                <a class="nav-link" href="songs.html">Dalok</a>
                <a class="nav-link" href="playlist.html">Új lista</a>
            </div>
        </div>
    </nav>


    <div class="container my-5">
        <h2>Új lejátszási lista</h2>

        <form class="mt-4 col-6 mx-auto">
            <div class="mb-3">
                <label class="form-label">Lista neve</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Készítő</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Leírás</label>
                <textarea class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Műfaj</label>
                <select class="form-select">
                    <option>Pop</option>
                    <option>Rock</option>
                    <option>Jazz</option>
                    <option>Elektronikus</option>
                </select>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">
                    Nyilvános lista
                </label>
            </div>

            <button class="btn btn-primary w-100">Mentés</button>
        </form>
    </div>

</body>
</html>
