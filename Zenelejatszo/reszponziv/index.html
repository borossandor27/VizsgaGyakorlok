<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenetár</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero-section text-white d-flex align-items-center">
        <div class="container">
            <div class="overlay w-100 mx-auto text-center p-4 rounded-5 h-75">
                <h1 class="display-4">Zenetár lejátszó rendszer</h1>
                <p class="lead">Reszponzív weboldal Bootstrap + saját CSS</p>
                <div>
                    <a href="songs.html" class="btn btn-light me-2">Dalok listája</a>
                    <a href="playlist.html" class="btn btn-outline-light">Új lista</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row g-4">
            <div class="col-lg-4 col-md-6 col-12">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Dalok</h5>
                        <p class="card-text">Dalok listája táblázatos formában.</p>
                        <a href="songs.html" class="btn btn-primary">Megnyitás</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6 col-12">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Új lista</h5>
                        <p class="card-text">Lejátszási lista létrehozása.</p>
                        <a href="playlist.html" class="btn btn-primary">Megnyitás</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6 col-12">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Borítókép</h5>
                        <p class="card-text">Dalok képének módosítása.</p>
                        <a href="#" class="btn btn-primary">Megnyitás</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
