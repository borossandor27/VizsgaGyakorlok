<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foglalás – Utazási ajánlatok</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="stilus.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">✈️ TravelApp</a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#foMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="foMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Kezdőlap</a></li>
                    <li class="nav-item"><a class="nav-link" href="ajanlatok.html">Ajánlatok listája</a></li>
                    <li class="nav-item"><a class="nav-link active" href="foglalas.html">Foglalás</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Tartalom -->
    <div class="container">
        <h1 class="oldal-cim">Utazás foglalása</h1>
        <p class="oldal-alcim">1. feladat: reszponzív űrlap + DEMO mentés (adatbázis nélkül)</p>

        <div class="urlap-keret">

            <!-- Csomag kiválasztása -->
            <div class="mb-3">
                <label for="csomag" class="form-label">Utazási csomag kiválasztása</label>
                <select class="form-select" id="csomag">
                    <option value="">Válasszon csomagot…</option>
                    <option>Görög nyár – Santorini, 2025-07-10 (7 éj, 285 000 Ft/fő)</option>
                    <option>Toscana körutazás – Firenze, 2025-08-03 (5 éj, 198 000 Ft/fő)</option>
                    <option>Barcelonai hétvége – Barcelona, 2025-09-19 (3 éj, 142 000 Ft/fő)</option>
                    <option>Dubaji fény – Dubai, 2025-11-14 (6 éj, 520 000 Ft/fő)</option>
                    <option>Prágai városnézés – Prága, 2025-10-04 (4 éj, 118 000 Ft/fő)</option>
                </select>
            </div>

            <!-- Fogllaló neve -->
            <div class="mb-3">
                <label for="nev" class="form-label">Foglaló neve</label>
                <input type="text" class="form-control" id="nev"
                       placeholder="Pl. Kovács Anna">
            </div>

            <!-- Email + Telefon egymás mellett -->
            <div class="row mb-3">
                <div class="col-12 col-sm-7">
                    <label for="email" class="form-label">E-mail cím</label>
                    <input type="email" class="form-control" id="email"
                           placeholder="pl. kovacsanna@email.hu">
                </div>
                <div class="col-12 col-sm-5 mt-3 mt-sm-0">
                    <label for="telefon" class="form-label">Telefonszám</label>
                    <input type="tel" class="form-control" id="telefon"
                           placeholder="+36 30 123 4567">
                </div>
            </div>

            <!-- Utazók száma + Szoba típusa egymás mellett -->
            <div class="row mb-3">
                <div class="col-12 col-sm-5">
                    <label for="utazok" class="form-label">Utazók száma</label>
                    <input type="number" class="form-control" id="utazok"
                           placeholder="Pl. 2" min="1" max="20" value="2">
                </div>
                <div class="col-12 col-sm-7 mt-3 mt-sm-0">
                    <label for="szoba" class="form-label">Szoba típusa</label>
                    <select class="form-select" id="szoba">
                        <option value="">Válasszon szobatípust…</option>
                        <option>Egyágyas szoba</option>
                        <option>Kétágyas szoba</option>
                        <option>Franciaágyas szoba</option>
                        <option>Apartman</option>
                        <option>Lakosztály</option>
                    </select>
                </div>
            </div>

            <!-- Ellátás -->
            <div class="mb-3">
                <label for="ellatas" class="form-label">Ellátás</label>
                <select class="form-select" id="ellatas">
                    <option value="">Válasszon ellátást…</option>
                    <option>Csak szállás (RO)</option>
                    <option>Reggeli (BB)</option>
                    <option>Félpanzió (HB)</option>
                    <option>Teljes panzió (FB)</option>
                    <option>All inclusive (AI)</option>
                </select>
            </div>

            <!-- Különleges kérés -->
            <div class="mb-3">
                <label for="kerelem" class="form-label">Különleges kérés (opcionális)</label>
                <textarea class="form-control" id="kerelem" rows="3"
                          placeholder="Pl. allergiaigény, korai bejelentkezés, különleges alkalom…"></textarea>
            </div>

            <!-- Mentés gomb -->
            <div class="d-grid mb-3">
                <button type="button" class="btn btn-primary">Foglalás elküldése</button>
            </div>

        </div>

        <div class="megjegyzes-doboz">
            <strong>Megjegyzés:</strong> A foglalás itt DEMO jellegű (1. feladat), adatbázis-művelet nincs.
        </div>
    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
