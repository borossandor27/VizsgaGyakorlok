<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelentkezés – Maratonfutás nyilvántartó</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="stilus.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏃 MaratonApp</a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#foMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="foMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Kezdőlap</a></li>
                    <li class="nav-item"><a class="nav-link" href="esemenylista.html">Eseménylista</a></li>
                    <li class="nav-item"><a class="nav-link active" href="jelentkezes.html">Jelentkezés</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Tartalom -->
    <div class="container">
        <h1 class="oldal-cim">Jelentkezés versenyre</h1>
        <p class="oldal-alcim">1. feladat: reszponzív űrlap + DEMO mentés (adatbázis nélkül)</p>

        <div class="urlap-keret mx-auto">
            
            <!-- Verseny kiválasztása -->
            <div class="mb-3">
                <label for="verseny" class="form-label">Verseny kiválasztása</label>
                <select class="form-select" id="verseny">
                    <option value="">Válasszon versenyt…</option>
                    <option>Budapest Maraton – 2025-10-12 (42 km)</option>
                    <option>Balatoni Félmaraton – 2025-09-06 (21 km)</option>
                    <option>Debrecen Futófesztivál – 2025-08-23 (10 km)</option>
                    <option>Pécsi Városvédő Futás – 2025-07-19 (5 km)</option>
                    <option>Miskolci Hegyimaraton – 2025-11-02 (42 km)</option>
                    <option>Győri Tavaszi Futam – 2025-09-28 (10 km)</option>
                </select>
            </div>

            <!-- Név -->
            <div class="mb-3">
                <label for="nev" class="form-label">Versenyző neve</label>
                <input type="text" class="form-control" id="nev"
                       placeholder="Pl. Kovács Anna">
            </div>

            <!-- Születési év + Nem egymás mellett -->
            <div class="row mb-3">
                <div class="col-12 col-sm-6">
                    <label for="szul_ev" class="form-label">Születési év</label>
                    <input type="number" class="form-control" id="szul_ev"
                           placeholder="Pl. 1990" min="1940" max="2010">
                </div>
                <div class="col-12 col-sm-6 mt-3 mt-sm-0">
                    <label for="nem" class="form-label">Nem</label>
                    <select class="form-select" id="nem">
                        <option value="">Válasszon…</option>
                        <option>Férfi</option>
                        <option>Nő</option>
                    </select>
                </div>
            </div>

            <!-- Email + Telefonszám egymás mellett -->
            <div class="row mb-3">
                <div class="col-12 col-sm-7">
                    <label for="email" class="form-label">E-mail cím</label>
                    <input type="email" class="form-control" id="email"
                           placeholder="pl. kovacsanna@email.hu">
                </div>
                <div class="col-12 col-sm-5 mt-3 mt-sm-0">
                    <label for="telefon" class="form-label">Telefonszám</label>
                    <input type="tel" class="form-control" id="telefon"
                           placeholder="+36 30 123 4567">
                </div>
            </div>

            <!-- Póló méret -->
            <div class="mb-3">
                <label for="polo" class="form-label">Emlékeztetési póló mérete</label>
                <select class="form-select" id="polo">
                    <option value="">Válasszon méretet…</option>
                    <option>XS</option>
                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                    <option>XL</option>
                    <option>XXL</option>
                </select>
            </div>

            <!-- Megjegyzés -->
            <div class="mb-3">
                <label for="megjegyzes" class="form-label">Megjegyzés (opcionális)</label>
                <textarea class="form-control" id="megjegyzes" rows="3"
                          placeholder="Pl. sérülés, különleges igény…"></textarea>
            </div>

            <!-- Mentés gomb -->
            <div class="d-grid mb-3">
                <button type="button" class="btn btn-primary">Jelentkezés elküldése</button>
            </div>

        </div>

        <div class="megjegyzes-doboz">
            <strong>Megjegyzés:</strong> A jelentkezés itt DEMO jellegű (1. feladat), adatbázis-művelet nincs.
        </div>
    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
