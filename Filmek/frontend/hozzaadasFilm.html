<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Film hozzáadása – Klasszikus Filmek</title>
  <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 5b. feladat: Menü KÖZÉPEN jelenik meg -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container justify-content-center">
      <a class="navbar-brand" href="index.html">🎬 Klasszikus Filmek</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-center" id="navbarMenu">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Kezdőoldal</a></li>
          <li class="nav-item"><a class="nav-link" href="filmek.html">A filmek adatai</a></li>
          <li class="nav-item"><a class="nav-link active" href="hozzaadasFilm.html">Film hozzáadása</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    <h2 class="mb-4">Egy új film rögzítése</h2>

    <div id="hibaUzenet" class="alert alert-danger d-none" role="alert"></div>

    <div class="row justify-content-start">
      <div class="col-md-7">

        <div class="mb-3">
          <label for="filmCim" class="form-label">A film címe</label>
          <textarea class="form-control" id="filmCim" rows="2"></textarea>
        </div>

        <!-- 5c. feladat: Műfaj select – API-ból töltve -->
        <div class="mb-3">
          <label for="mufaj" class="form-label">A film műfaja</label>
          <select class="form-select" id="mufaj">
            <option value="">Válasszon műfajt...</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="rendezo" class="form-label">A film rendezője</label>
          <textarea class="form-control" id="rendezo" rows="2"></textarea>
        </div>

        <div class="mb-3">
          <label for="gyartasiEv" class="form-label">Gyártási év</label>
          <textarea class="form-control" id="gyartasiEv" rows="1"></textarea>
        </div>

        <div class="mb-3">
          <label for="orszag" class="form-label">Származási ország</label>
          <textarea class="form-control" id="orszag" rows="1"></textarea>
        </div>

        <div class="mb-3">
          <label for="szereplok" class="form-label">Szereplők</label>
          <textarea class="form-control" id="szereplok" rows="3"></textarea>
        </div>

        <div class="mb-3">
          <label for="dijak" class="form-label">Legsikeresebb díjak</label>
          <textarea class="form-control" id="dijak" rows="2"></textarea>
        </div>

        <!-- 5d. feladat: Új beviteli mező – filmplakát linkje -->
        <div class="mb-3">
          <label for="kepUrl" class="form-label">A filmről készült filmplakát linkje</label>
          <input type="url" class="form-control" id="kepUrl"
                 placeholder="https://...">
        </div>

        <!-- 5e. feladat: Feltöltés gomb – POST /api/ujfilm -->
        <button class="btn btn-dark w-100 mt-2" id="feltoltesGomb">Feltöltés</button>

      </div>
    </div>
  </div>

  <script src="bootstrap/bootstrap.bundle.min.js"></script>
  <script>
    const API = 'http://localhost:5500';

    // 5c. feladat: Műfajok betöltése a select-be
    async function mufajokBetolt() {
      try {
        const res     = await fetch(`${API}/api/mufajok`);
        const mufajok = await res.json();
        const sel     = document.getElementById('mufaj');
        mufajok.forEach(m => {
          sel.innerHTML += `<option value="${m.id}">${m.mufaj_neve}</option>`;
        });
      } catch (e) {
        console.error('Műfajok betöltési hiba:', e);
      }
    }

    // 5e. feladat: Feltöltés gomb – POST /api/ujfilm
    document.getElementById('feltoltesGomb').addEventListener('click', async () => {
      const body = {
        cim:                document.getElementById('filmCim').value.trim(),
        mufaj_id:           document.getElementById('mufaj').value,
        rendezo:            document.getElementById('rendezo').value.trim(),
        gyartasi_ev:        document.getElementById('gyartasiEv').value.trim(),
        szarmazasi_orszag:  document.getElementById('orszag').value.trim(),
        szereplok:          document.getElementById('szereplok').value.trim(),
        legsikeresebb_dijak: document.getElementById('dijak').value.trim(),
        kep_url:            document.getElementById('kepUrl').value.trim()
      };

      const hibaDiv = document.getElementById('hibaUzenet');

      try {
        const res = await fetch(`${API}/api/ujfilm`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body)
        });

        if (res.status === 201) {
          // 5f. feladat: Sikeres küldés → navigálás a filmek oldalra
          window.location.href = 'filmek.html';
        } else {
          const hiba = await res.json();
          hibaDiv.classList.remove('d-none');
          hibaDiv.textContent = hiba.uzenet || 'Ismeretlen hiba.';
        }
      } catch (e) {
        hibaDiv.classList.remove('d-none');
        hibaDiv.textContent = 'A szerverrel nem sikerült kapcsolatot létesíteni.';
      }
    });

    mufajokBetolt();
  </script>
</body>
</html>
